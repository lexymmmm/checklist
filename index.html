<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>

<title>Apartment Checklist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,system-ui,sans-serif;background:#FDF6F0;color:#2A1015;min-height:100vh}
button,input,textarea,select{font-family:inherit}
/* ── Header ── */
.hdr{background:linear-gradient(135deg,#6B1A2A,#9B2335,#C0392B);color:#fff;padding:16px}
.hdr h1{font-size:19px;font-weight:800}
.hdr-sub{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#F5A87B;margin-bottom:3px}
.hdr-meta{font-size:11px;color:rgba(255,255,255,.6);margin-top:3px}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.hdr-btns{display:flex;gap:6px;flex-shrink:0;align-items:center}
.btn-hdr{padding:6px 11px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.15);color:#fff}
.btn-hdr.on{background:#F5A87B;color:#6B1A2A}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.8);margin:12px 0 4px}
.prog-pct{color:#F5A87B;font-weight:700}
.prog-bar{background:rgba(255,255,255,.2);border-radius:99px;height:5px}
.prog-fill{background:#F5A87B;height:100%;border-radius:99px;transition:width .3s}
/* ── Cost bar ── */
.cost-bar{background:#4A0E18;color:#F5A87B;font-size:11px;font-weight:700;padding:6px 16px;text-align:center;letter-spacing:.04em}
/* ── View tabs ── */
.vtabs{display:flex;background:#FAE8DC;border-bottom:1px solid #EDD5CC}
.vtab{flex:1;padding:9px 0;border:none;background:transparent;font-size:12px;color:#8A5A62;border-bottom:2.5px solid transparent;cursor:pointer}
.vtab.on{font-weight:700;color:#C0392B;border-bottom-color:#C0392B}
/* ── Toolbar (search + sort + trip) ── */
.toolbar{padding:7px 10px;background:#FAE8DC;border-bottom:1px solid #EDD5CC;display:flex;gap:6px;align-items:center}
.toolbar input{flex:1;padding:7px 10px;border:1px solid #EDD5CC;border-radius:8px;font-size:13px;background:#fff;outline:none}
.toolbar select{padding:7px 8px;border:1px solid #EDD5CC;border-radius:8px;font-size:11px;background:#fff;outline:none;color:#6B1A2A;font-weight:600;max-width:110px}
.btn-trip{padding:6px 10px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;background:#FAD4DC;color:#8A1A3A}
.btn-trip.on{background:#C0392B;color:#fff}
/* ── Scroll tabs ── */
.scroll-tabs{display:flex;overflow-x:auto;padding:6px 10px;gap:5px;background:#FAE8DC;border-bottom:1px solid #EDD5CC;scrollbar-width:none;align-items:center}
.scroll-tabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:5px 11px;border-radius:99px;border:1px solid #EDD5CC;font-size:11px;cursor:pointer;white-space:nowrap;background:#fff;color:#8A5A62}
.stab.on{background:#C0392B;color:#fff;font-weight:700;border-color:#C0392B}
.stab .bdg{margin-left:4px;font-size:9px;font-weight:800;padding:1px 5px;border-radius:99px;background:rgba(255,255,255,.25);color:#fff}
.stab:not(.on) .bdg{background:#FAE8DC;color:#C0392B}
/* ── Location tabs ── */
.loc-tabs{display:flex;overflow-x:auto;padding:5px 10px;gap:5px;background:#FDF0F5;border-bottom:1px solid #EDD5CC;scrollbar-width:none}
.loc-tabs::-webkit-scrollbar{display:none}
.ltab{flex-shrink:0;padding:4px 10px;border-radius:99px;border:1px solid #F0C0D0;font-size:11px;cursor:pointer;white-space:nowrap;background:#fff;color:#8A3A5A}
.ltab.on{background:#E8798A;color:#fff;font-weight:700;border-color:#E8798A}
/* ── Edit banner ── */
.edit-banner{background:#FFF0F5;border-bottom:1px solid #F5C8D8;padding:6px 12px;font-size:11px;color:#8A1A3A}
/* ── List ── */
.list{padding:10px 12px 80px}
.list-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.list-hdr h2{font-size:15px;font-weight:800}
.list-cnt{font-size:11px;color:#8A5A62}
/* ── Room image ── */
.room-img-wrap{margin-bottom:10px;border-radius:10px;overflow:hidden;border:1px solid #EDD5CC;background:#FAE8DC}
.room-img-wrap img{width:100%;display:block;max-height:200px;object-fit:cover}
.btn-room-img{margin:0 0 10px;width:100%;padding:8px;border:1.5px dashed #EDD5CC;border-radius:8px;background:transparent;color:#8A5A62;font-size:12px;cursor:pointer}
/* ── Item card ── */
.item{background:#fff;border:1px solid #EDD5CC;border-radius:11px;padding:10px 11px;margin-bottom:6px;transition:background .2s}
.item.s-own{background:#F0FBF4;border-color:#A8D8B8}
.item.s-delivered{background:#FFF8F0;border-color:#F5C8A0}
.item.s-ordered{background:#F5F0FF;border-color:#C8B8F0}
.item.confirm-del{background:#FFF0F0;border-color:#F5C6C6}
.item-row{display:flex;align-items:center;gap:7px}
/* ── Status pill (replaces checkbox) ── */
.status-pill{flex-shrink:0;padding:4px 9px;border-radius:99px;border:none;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap}
.sp-need{background:#FFE8EE;color:#C0392B}
.sp-ordered{background:#EDE8FF;color:#6A3ABF}
.sp-delivered{background:#FFF3E0;color:#C07020}
.sp-own{background:#E8F8EE;color:#1A8A3A}
.item-main{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:500}
.item-name.own{text-decoration:line-through;color:#8A5A62}
.item-meta-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;align-items:center}
.itag{font-size:10px;padding:2px 6px;border-radius:99px;font-weight:600}
.iloc{font-size:10px;padding:2px 6px;border-radius:99px;font-weight:600;background:#FDE8F0;color:#8A1A3A}
.icost{font-size:10px;padding:2px 6px;border-radius:99px;font-weight:600;background:#E8F5E8;color:#1A6A1A}
.item-btns{display:flex;gap:4px;flex-shrink:0}
.ib{border:none;border-radius:6px;padding:4px 7px;font-size:13px;cursor:pointer;background:#F5F0EE;color:#8A5A62}
.ib.on{background:#FAD4DC;color:#C0392B}
/* ── Panel ── */
.panel{margin-top:8px;padding:11px;background:#FDF0F5;border-radius:10px;border:1px solid #F0C8D8;display:flex;flex-direction:column;gap:8px}
.panel-title{font-size:10px;font-weight:800;color:#8A1A3A;letter-spacing:.07em;text-transform:uppercase}
.panel input,.panel textarea,.panel select{width:100%;padding:6px 9px;border:1px solid #EDD5CC;border-radius:7px;font-size:12px;background:#fff;outline:none;color:#2A1015}
.panel textarea{resize:vertical;min-height:56px}
.price-row{display:flex;gap:6px;align-items:center}
.price-row input{flex:1}
.price-sep{font-size:12px;color:#8A5A62;flex-shrink:0}
.panel-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
/* ── Buttons ── */
.btn-sm{padding:5px 10px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
.btn-pink{background:#F5A0B8;color:#6B1A2A}
.btn-rose{background:#E8798A;color:#fff}
.btn-save{background:#C0392B;color:#fff}
.btn-cancel{background:#EDD5CC;color:#6B1A2A}
.btn-clear{background:#FFE8EE;color:#C0392B}
.btn-del{background:#FFE8EE;color:#C0392B;font-size:10px;padding:3px 7px}
/* ── Link / image items ── */
.link-row{display:flex;gap:5px;align-items:center;margin-bottom:4px}
.link-row input{flex:1;min-width:0;padding:5px 8px;border:1px solid #EDD5CC;border-radius:6px;font-size:11px;background:#fff;outline:none}
.img-grid{display:flex;flex-wrap:wrap;gap:5px}
.img-thumb{position:relative;width:68px;height:56px}
.img-thumb img{width:100%;height:100%;object-fit:cover;border-radius:6px;border:1px solid #EDD5CC}
.img-del{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:99px;background:#C0392B;color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* ── Tag picker ── */
.tpill-grid{display:flex;flex-wrap:wrap;gap:5px}
.tpill{padding:4px 9px;border-radius:99px;border:1.5px solid #EDD5CC;background:#fff;color:#8A5A62;font-size:11px;cursor:pointer}
.tpill.on{font-weight:700}
/* ── Location picker ── */
.loc-pill-grid{display:flex;flex-wrap:wrap;gap:5px}
.lpill{padding:4px 9px;border-radius:99px;border:1.5px solid #F0C0D0;background:#fff;color:#8A3A5A;font-size:11px;cursor:pointer}
.lpill.on{font-weight:700;background:#FDE8F0;border-color:#E8798A;color:#8A1A3A}
/* ── Confirm ── */
.confirm-row{display:flex;align-items:center;gap:7px}
.confirm-txt{flex:1;font-size:12px;color:#9B1B1B}
/* ── Add item ── */
.add-row{display:flex;gap:7px;margin-top:8px}
.add-input{flex:1;padding:9px 11px;border-radius:9px;border:1.5px dashed #E8798A;font-size:13px;outline:none;background:#fff}
.btn-add-item{padding:9px 14px;background:#C0392B;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer}
.btn-show-edit{width:100%;margin-top:8px;padding:9px;border-radius:9px;border:1.5px dashed #EDD5CC;background:transparent;color:#8A5A62;font-size:12px;cursor:pointer}
/* ── Previews ── */
.prev-imgs{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;padding-left:4px}
.prev-img{width:60px;height:48px;object-fit:cover;border-radius:6px;border:1px solid #EDD5CC}
.prev-links{margin-top:3px;display:flex;flex-direction:column;gap:2px}
.prev-link{font-size:11px;color:#C0392B;word-break:break-all}
.prev-note{margin-top:3px;font-size:11px;color:#8A5A62;font-style:italic}
/* ── Add room input ── */
.add-room-bar{padding:7px 10px;background:#FDF0F5;border-bottom:1px solid #F0C8D8;display:flex;gap:6px;align-items:center}
.add-room-bar input{padding:6px 9px;border:1px solid #EDD5CC;border-radius:7px;font-size:13px;background:#fff;outline:none}
.del-room-bar{padding:7px 10px;background:#FFF0F0;border-bottom:1px solid #F5C6C6;display:flex;align-items:center;gap:8px}
/* ── Empty / toast ── */
.empty{text-align:center;padding:24px 0;color:#8A5A62;font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#4A0E18;color:#F5A87B;padding:7px 16px;border-radius:99px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* ── Drag to reorder ── */
.item.dragging{opacity:.4;border:2px dashed #E8798A}
.item.drag-over{border-top:3px solid #C0392B}
</style>
</head>

async function sbSave(payload) {
  try {
    // Try PATCH first (update existing row)
    var res = await fetch(SB_URL + '/rest/v1/checklist?id=eq.main', {
      method: 'PATCH',
      headers: SB_HEADERS,

  } catch(e) { console.warn('Supabase save failed:', e); return false; }
}

async function sbLoad() {

  Object.keys(meta).forEach(function(k){metaNoImg[k]={tags:meta[k].tags,links:meta[k].links,notes:meta[k].notes,priceMin:meta[k].priceMin,priceMax:meta[k].priceMax,location:meta[k].location};});
  return{rooms:rooms,status:itemStatus,meta:metaNoImg,locations:locations,images:imgMap,roomImages:roomImgMap};
}

function saveLocal(payload){
  try{
    var p=Object.assign({},payload);
    delete p.images; delete p.roomImages;
    localStorage.setItem(LSKEY,JSON.stringify(p));
    try{localStorage.setItem(LSKEY+"_imgs",JSON.stringify(payload.images||{}));}catch(e){}
    try{localStorage.setItem(LSKEY+"_ri",JSON.stringify(payload.roomImages||{}));}catch(e){}
  }catch(e){}
}

function saveState(silent){
  var payload=buildPayload();
  // Always save to localStorage as instant backup
  saveLocal(payload);
  // Save to Supabase (async, cloud)
  sbSave(payload).then(function(ok){
    if(!silent)showToast(ok?"✓ Saved to cloud":"✓ Saved locally");
  });
}

function applyData(d){
  rooms=d.rooms||DR.map(function(r){return{id:r.id,label:r.label,emoji:r.emoji,items:r.items.slice()};});
  itemStatus=d.status||{};
  meta=d.meta||{};
  locations=d.locations||["Philadelphia, PA","Sarasota, FL","Fort Lee, NJ"];
  roomImgs={};
  // Restore images
  var imgs=d.images||{};
  var ri=d.roomImages||{};
  rooms.forEach(function(r){
    roomImgs[r.id]=ri[r.id]||null;
    r.items.forEach(function(n){
      var k=r.id+"::"+n;
      if(!itemStatus[k])itemStatus[k]="need";
      if(!meta[k])meta[k]={tags:[],links:[],images:[],notes:"",priceMin:"",priceMax:"",location:""};
      meta[k].images=imgs[k]||meta[k].images||[];
      if(!meta[k].links)meta[k].links=[];
      if(!meta[k].tags)meta[k].tags=[];
      if(meta[k].priceMin===undefined)meta[k].priceMin="";
      if(meta[k].priceMax===undefined)meta[k].priceMax="";
      if(meta[k].location===undefined)meta[k].location="";
    });
  });
  viewMode="room";activeRoom=rooms[0]?rooms[0].id:"kitchen";
  activeTag=null;activeLoc=null;searchQ="";sortBy="default";tripMode=false;
  editMode=false;openPanel=null;panelDraft=null;confirmDelKey=null;tagPickerKey=null;
  addingRoom=false;confirmDelRoomId=null;
}

function loadFromLocal(){
  var raw=localStorage.getItem(LSKEY);
  if(!raw)return null;
  var d=JSON.parse(raw);
  try{d.images=JSON.parse(localStorage.getItem(LSKEY+"_imgs")||"{}");}catch(e){d.images={};}
  try{d.roomImages=JSON.parse(localStorage.getItem(LSKEY+"_ri")||"{}");}catch(e){d.roomImages={};}
  return d;
}

function loadState(){
  // Show loading indicator
  document.getElementById("app").innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#FDF6F0;flex-direction:column;gap:12px"><div style="font-size:32px">🌸</div><div style="font-size:14px;color:#8A5A62">Loading your checklist…</div></div>';
  // Try Supabase first
  sbLoad().then(function(cloudData){
    try{
      if(cloudData&&cloudData.rooms){
        applyData(cloudData);
      } else {
        // Fall back to localStorage
        var local=loadFromLocal();
        if(local){applyData(local);}
        else{initFresh();}
      }
    }catch(e){
      try{var local=loadFromLocal();if(local){applyData(local);}else{initFresh();}}catch(e2){initFresh();}
    }
    render();
  }).catch(function(){
    // Offline - use localStorage
    try{
      var local=loadFromLocal();
      if(local){applyData(local);}else{initFresh();}
    }catch(e){initFresh();}
    render();
  });
  return; // render called async above
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function mk(rid,n){return rid+"::"+n;}
function h(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function gm(k){return meta[k]||(meta[k]={tags:[],links:[],images:[],notes:"",priceMin:"",priceMax:"",location:""});}
function allKeys(){return rooms.flatMap(function(r){return r.items.map(function(n){return mk(r.id,n);});});}
function ownCnt(){return allKeys().filter(function(k){return itemStatus[k]==="own";}).length;}
function totalCnt(){return allKeys().length;}
function pct(){var t=totalCnt();return t>0?Math.round(ownCnt()/t*100):0;}
function roomOwn(r){return r.items.filter(function(n){return itemStatus[mk(r.id,n)]==="own";}).length;}
function curRoom(){return rooms.find(function(r){return r.id===activeRoom;})||rooms[0];}

function costOf(k){
  var m=gm(k);
  var mn=parseFloat((m.priceMin||"").replace(/[^0-9.]/g,""));
  var mx=parseFloat((m.priceMax||"").replace(/[^0-9.]/g,""));
  if(!isNaN(mx))return mx;
  if(!isNaN(mn))return mn;
  return 0;
}
function totalBudget(){var t=0;allKeys().forEach(function(k){t+=costOf(k);});return t.toFixed(2);}
function totalOwned(){var t=0;allKeys().forEach(function(k){if(itemStatus[k]==="own")t+=costOf(k);});return t.toFixed(2);}

function tagCount(tid){
  var cnt=0,own=0;
  rooms.forEach(function(r){r.items.forEach(function(n){var k=mk(r.id,n),m=gm(k);if(m.tags.indexOf(tid)>=0){cnt++;if(itemStatus[k]==="own")own++;}});});
  return{cnt:cnt,own:own};
}

function getDisplayed(){
  var flat=[];
  rooms.forEach(function(r){r.items.forEach(function(n){flat.push({room:r,name:n,key:mk(r.id,n)});});});
  // Trip mode: only show items not yet owned
  if(tripMode)flat=flat.filter(function(x){return itemStatus[x.key]!=="own";});
  // Location filter
  if(activeLoc)flat=flat.filter(function(x){return gm(x.key).location===activeLoc;});
  // Search
  if(searchQ.trim()){var q=searchQ.toLowerCase();flat=flat.filter(function(x){return x.name.toLowerCase().indexOf(q)>=0;});}
  else if(viewMode==="room"&&!activeLoc)flat=flat.filter(function(x){return x.room.id===activeRoom;});
  else if(viewMode==="tag"&&activeTag&&!activeLoc)flat=flat.filter(function(x){return gm(x.key).tags.indexOf(activeTag)>=0;});
  else if(viewMode==="tag"&&!activeTag&&!activeLoc)flat=[];
  // Sort
  if(sortBy==="status"){flat.sort(function(a,b){var so=["need","ordered","delivered","own"];return so.indexOf(itemStatus[a.key])-so.indexOf(itemStatus[b.key]);});}
  else if(sortBy==="cost-lo"){flat.sort(function(a,b){return costOf(a.key)-costOf(b.key);});}
  else if(sortBy==="cost-hi"){flat.sort(function(a,b){return costOf(b.key)-costOf(a.key);});}
  else if(sortBy==="tag"){flat.sort(function(a,b){var ta=(gm(a.key).tags[0]||"zzz"),tb=(gm(b.key).tags[0]||"zzz");return ta.localeCompare(tb);});}
  else if(sortBy==="location"){flat.sort(function(a,b){return(gm(a.key).location||"zzz").localeCompare(gm(b.key).location||"zzz");});}
  return flat;
}

    var priceHtml='<div class="panel-title">💰 Price Range</div>'
      +'<div class="price-row">'
        +'<input type="number" min="0" step="0.01" placeholder="Min $" value="'+h(pd.priceMin||"")+'" oninput="panelDraft.priceMin=this.value"/>'
        +'<span class="price-sep">–</span>'
        +'<input type="number" min="0" step="0.01" placeholder="Max $" value="'+h(pd.priceMax||"")+'" oninput="panelDraft.priceMax=this.value"/>'
      +"</div>";

    var locHtml='<div class="panel-title">📍 Location</div>'
      +'<select oninput="panelDraft.location=this.value">'
        +'<option value="">— No location —</option>'
        +locations.map(function(loc){return'<option value="'+h(loc)+'"'+(pd.location===loc?" selected":"")+'>'+h(loc)+"</option>";}).join("")
      +"</select>";

    var tagsHtml='<div class="panel-title">🏷️ Tags</div>'
      +'<div class="tpill-grid">'+ALL_TAGS.map(function(t){var sel=pd.tags.indexOf(t.id)>=0;return'<button class="tpill'+(sel?" on":"")+'" style="'+(sel?"border-color:"+t.tc+";background:"+t.bg+";color:"+t.tc:"")+'" onclick="pdTogTag(\''+t.id+'\')">'+t.emoji+" "+t.label+"</button>";}).join("")+"</div>"
      +'<div class="panel-row" style="margin-top:4px"><input id="ctInput" placeholder="Custom tag…" style="flex:1;padding:5px 8px;border:1px solid #EDD5CC;border-radius:6px;font-size:11px;background:#fff;outline:none"/><button class="btn-sm btn-rose" onclick="pdCustomTag()">Add</button></div>';

    panelHtml='<div class="panel">'+statusHtml+linksHtml+imgsHtml+notesHtml+priceHtml+locHtml+tagsHtml
      +'<div class="panel-row"><button class="btn-sm btn-save" data-k="'+k+'" onclick="savePanel(this.dataset.k)">Save</button><button class="btn-sm btn-cancel" onclick="closePanel()">Cancel</button><button class="btn-sm btn-clear" data-k="'+k+'" onclick="clearPanel(this.dataset.k)">Clear all</button></div>'
    +"</div>";
  }

  return'<div class="item s-'+st+'" data-k="'+k+'" data-rid="'+room.id+'">'
    +'<div class="item-row">'
      +dragHandle+delBtn
      +'<span class="status-pill '+so.cls+'">'+so.label+'</span>'
      +'<div class="item-main">'
        +(showRoom?'<span style="font-size:10px;color:#8A5A62;margin-right:3px">['+h(room.label)+"]</span>":"")
        +'<span class="item-name'+(st==="own"?" own":"")+'">'+h(name)+"</span>"
      +"</div>"
      +'<div class="item-btns">'+attBtn+"</div>"
    +"</div>"
    +prevHtml+panelHtml
  +"</div>";
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function cycleStatus(k){itemStatus[k]=nextStatus(itemStatus[k]||"need");queueSave();render();}
function setRoom(id){activeRoom=id;openPanel=null;tagPickerKey=null;render();}
function setView(v){viewMode=v;activeTag=null;searchQ="";render();}
function setTag(id){activeTag=activeTag===id?null:id;render();}
function setLoc(loc){activeLoc=loc;render();}
function setSearch(v){searchQ=v;render();}
function setSort(v){sortBy=v;render();}
function setTrip(v){tripMode=v;render();}
function toggleEdit(){editMode=!editMode;confirmDelKey=null;tagPickerKey=null;openPanel=null;addingRoom=false;confirmDelRoomId=null;render();}
function setConf(k){confirmDelKey=k;render();}

function doDelete(rid,name){
  var r=rooms.find(function(x){return x.id===rid;});
  if(r)r.items=r.items.filter(function(n){return n!==name;});
  var k=mk(rid,name);delete itemStatus[k];delete meta[k];
  confirmDelKey=null;queueSave();render();
}

function doAddItem(){
  var inp=document.getElementById("addInput");if(!inp)return;
  var text=inp.value.trim();if(!text)return;
  var r=rooms.find(function(x){return x.id===activeRoom;});if(!r)return;
  if(r.items.indexOf(text)>=0){inp.value="";return;}
  r.items.push(text);
  var k=mk(activeRoom,text);
  itemStatus[k]="need";meta[k]={tags:[],links:[],images:[],notes:"",priceMin:"",priceMax:"",location:""};
  queueSave();render();
}

// ── Room management
function showAddRoom(){addingRoom=true;confirmDelRoomId=null;render();}
function cancelAddRoom(){addingRoom=false;render();}
function doAddRoom(){
  var em=document.getElementById("nre"),nm=document.getElementById("nrn");
  if(!nm||!nm.value.trim())return;
  var label=nm.value.trim(),emoji=(em&&em.value.trim())||"🏠";
  var id="r_"+Date.now();
  rooms.push({id:id,label:label,emoji:emoji,items:[]});
  activeRoom=id;addingRoom=false;queueSave();render();
}
function confirmDelRoom(id){confirmDelRoomId=id;addingRoom=false;render();}
function cancelDelRoom(){confirmDelRoomId=null;render();}
function doDelRoom(id){
  var r=rooms.find(function(x){return x.id===id;});
  if(r)r.items.forEach(function(n){var k=mk(id,n);delete itemStatus[k];delete meta[k];});
  rooms=rooms.filter(function(x){return x.id!==id;});
  if(activeRoom===id)activeRoom=rooms.length>0?rooms[0].id:"";
  confirmDelRoomId=null;queueSave();render();
}

// ── Location management
function addLocation(){
  var name=prompt("New location name (e.g. Sarasota, FL):");
  if(name&&name.trim()&&locations.indexOf(name.trim())<0){locations.push(name.trim());queueSave();render();}
}

// ── Panel
function togPanel(k){
  if(openPanel===k){openPanel=null;panelDraft=null;}
  else{var m=gm(k);panelDraft={status:itemStatus[k]||"need",tags:m.tags.slice(),links:(m.links||[]).slice(),images:(m.images||[]).slice(),notes:m.notes||"",priceMin:m.priceMin||"",priceMax:m.priceMax||"",location:m.location||""};openPanel=k;}
  render();
}
function closePanel(){openPanel=null;panelDraft=null;render();}
function savePanel(k){
  if(!panelDraft)return;
  var m=gm(k);
  if(panelDraft.status)itemStatus[k]=panelDraft.status;
  m.tags=panelDraft.tags;m.links=panelDraft.links;m.images=panelDraft.images;
  m.notes=panelDraft.notes;m.priceMin=panelDraft.priceMin;m.priceMax=panelDraft.priceMax;
  m.location=panelDraft.location;
  openPanel=null;panelDraft=null;queueSave();render();
}
function clearPanel(k){
  meta[k]={tags:[],links:[],images:[],notes:"",priceMin:"",priceMax:"",location:""};
  openPanel=null;panelDraft=null;queueSave();render();
}
function pdLinkDel(i){panelDraft.links.splice(i,1);render();}
function pdLinkAdd(){panelDraft.links.push("");render();}
function pdImgDel(i){panelDraft.images.splice(i,1);render();}
function pdTogTag(tid){var i=panelDraft.tags.indexOf(tid);if(i>=0)panelDraft.tags.splice(i,1);else panelDraft.tags.push(tid);render();}
function pdCustomTag(){
  var inp=document.getElementById("ctInput");if(!inp||!inp.value.trim())return;
  var v=inp.value.trim();
  if(!ALL_TAGS.find(function(t){return t.label===v;}))ALL_TAGS.push({id:"c_"+v.toLowerCase().replace(/\s+/g,"_"),label:v,emoji:"🔖",tc:"#6B1A2A",bg:"#FAE8DC"});
  var t=ALL_TAGS.find(function(t){return t.label===v;});
  if(t&&panelDraft.tags.indexOf(t.id)<0)panelDraft.tags.push(t.id);
  inp.value="";render();
}

// ── Images
var currentImgKey=null;
function triggerItemImgs(){document.getElementById("fi").click();}
document.getElementById("fi").addEventListener("change",function(e){
  var files=Array.from(e.target.files);if(!files.length||!panelDraft)return;
  var loaded=0;
  files.forEach(function(f){
    var rd=new FileReader();
    rd.onload=function(ev){compressImg(ev.target.result,function(c){panelDraft.images.push(c);loaded++;if(loaded===files.length)render();});};
    rd.readAsDataURL(f);
  });
  e.target.value="";
});
var currentRoomId=null;
function triggerRoomImg(rid){currentRoomId=rid;document.getElementById("ri").click();}
function setRoomImg(rid,val){roomImgs[rid]=val;queueSave();render();}
document.getElementById("ri").addEventListener("change",function(e){
  var f=e.target.files[0];if(!f)return;
  var rd=new FileReader();
  rd.onload=function(ev){compressImg(ev.target.result,function(c){roomImgs[currentRoomId]=c;queueSave();render();});};
  rd.readAsDataURL(f);e.target.value="";
});
function compressImg(dataUrl,cb){
  try{
    var img=new Image();
    img.onload=function(){var MAX=800,w=img.width,wh=img.height;if(w>MAX){wh=Math.round(wh*MAX/w);w=MAX;}var c=document.createElement("canvas");c.width=w;c.height=wh;c.getContext("2d").drawImage(img,0,0,w,wh);cb(c.toDataURL("image/jpeg",.6));};
    img.onerror=function(){cb(dataUrl);};img.src=dataUrl;
  }catch(e){cb(dataUrl);}
}


// Status changes handled inside panel

// ── DRAG TO REORDER (handle only) ────────────────────────────────────────────
var dragKey=null,dragRoomId=null;
function onHandleDragStart(e){
  dragKey=e.currentTarget.dataset.k;
  dragRoomId=e.currentTarget.dataset.rid;
  e.currentTarget.classList.add("dragging-src");
  e.dataTransfer.effectAllowed="move";
  e.stopPropagation();
}
function onHandleDragEnd(e){e.currentTarget.classList.remove("dragging-src");}
// drag handled by delegated listeners above

// Touch drag support for mobile
var touchDragKey=null,touchDragRoomId=null,touchDragEl=null,touchClone=null;
function onTouchStart(e){
  // Only drag handles trigger this
  var el=e.currentTarget;
  if(!el.classList.contains("drag-handle"))return;
  e.preventDefault();
  touchDragKey=el.dataset.k;
  touchDragRoomId=el.dataset.rid;
  touchDragEl=el;
  var itemEl=el.closest(".item")||el;
  touchClone=itemEl.cloneNode(true);
  touchClone.style.cssText="position:fixed;opacity:0.7;pointer-events:none;z-index:9999;width:"+itemEl.offsetWidth+"px;left:"+itemEl.getBoundingClientRect().left+"px;top:"+itemEl.getBoundingClientRect().top+"px;border-radius:11px;";
  document.body.appendChild(touchClone);
  itemEl.style.opacity="0.3";
  touchDragEl=itemEl;
}
function onTouchMove(e){
  if(!touchClone)return;
  e.preventDefault();
  var t=e.touches[0];
  touchClone.style.left=(t.clientX-touchClone.offsetWidth/2)+"px";
  touchClone.style.top=(t.clientY-30)+"px";
}
function onTouchEnd(e){
  if(!touchClone){return;}
  touchClone.remove();touchClone=null;
  if(touchDragEl){touchDragEl.style.opacity="";}
  var t=e.changedTouches[0];
  var el=document.elementFromPoint(t.clientX,t.clientY);
  // Walk up to find item with data-k
  var target=el;
  while(target&&!target.dataset.k)target=target.parentElement;
  if(target&&target.dataset.k&&target.dataset.k!==touchDragKey&&target.dataset.rid===touchDragRoomId){
    var r=rooms.find(function(x){return x.id===touchDragRoomId;});
    if(r){
      var dragName=touchDragKey.split("::").slice(1).join("::");
      var targetName=target.dataset.k.split("::").slice(1).join("::");
      var di=r.items.indexOf(dragName),ti=r.items.indexOf(targetName);
      if(di>=0&&ti>=0){r.items.splice(di,1);r.items.splice(ti,0,dragName);queueSave();render();}
    }
  }
  touchDragKey=null;touchDragRoomId=null;touchDragEl=null;
}

// ── DELEGATED DRAG DROP ──────────────────────────────────────────────────────
document.addEventListener("dragover",function(e){
  if(!dragKey)return;
  var item=e.target.closest(".item[data-k]");
  if(!item)return;
  e.preventDefault();
  // Remove drag-over from all others
  document.querySelectorAll(".item.drag-over").forEach(function(el){if(el!==item)el.classList.remove("drag-over");});
  item.classList.add("drag-over");
});
document.addEventListener("dragleave",function(e){
  var item=e.target.closest(".item[data-k]");
  if(item)item.classList.remove("drag-over");
});
document.addEventListener("drop",function(e){
  if(!dragKey)return;
  var item=e.target.closest(".item[data-k]");
  if(!item)return;
  e.preventDefault();
  document.querySelectorAll(".item.drag-over").forEach(function(el){el.classList.remove("drag-over");});
  var targetKey=item.dataset.k;
  var targetRoomId=item.dataset.rid;
  if(!targetKey||dragKey===targetKey||dragRoomId!==targetRoomId){dragKey=null;dragRoomId=null;return;}
  var r=rooms.find(function(x){return x.id===dragRoomId;});
  if(!r){dragKey=null;dragRoomId=null;return;}
  var dragName=dragKey.split("::").slice(1).join("::");
  var targetName=targetKey.split("::").slice(1).join("::");
  var di=r.items.indexOf(dragName),ti=r.items.indexOf(targetName);
  if(di>=0&&ti>=0){r.items.splice(di,1);r.items.splice(ti,0,dragName);queueSave();render();}
  dragKey=null;dragRoomId=null;
});

// ── FORCE SAVE ON HIDE ───────────────────────────────────────────────────────
// iOS PWA kills the page immediately on close - save synchronously on hide
document.addEventListener("visibilitychange", function(){
  if(document.visibilityState === "hidden") saveState(true);
});
window.addEventListener("pagehide", function(){ saveState(true); });
window.addEventListener("beforeunload", function(){ saveState(true); });

// loadState handles render async (fetches from Supabase first)
try{loadState();}catch(e){
  try{initFresh();}catch(e2){}
  try{render();}catch(e3){

  }
}
